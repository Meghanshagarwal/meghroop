<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Dark background, slightly rounded -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Geometric M mark — drawn as paths so no font dependency -->
  <!-- Valley at y=18, tops at y=6, verticals to y=26 -->
  <path
    d="M5 26V6L16 18L27 6V26"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Brand accent: tiny gradient dot at top-right -->
  <rect x="24" y="3" width="5" height="5" rx="1.5" fill="url(#g)"/>
</svg>
